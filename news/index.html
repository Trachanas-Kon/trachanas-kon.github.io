<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Νέα Ακραίφνιου – akraifnio.gr</title>
  <meta name="description" content="Τελευταίες ειδήσεις για το Ακραίφνιο Βοιωτίας από ελληνικά ΜΜΕ.">
  <link rel="canonical" href="https://akraifnio.gr/news/">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://akraifnio.gr/news/">
  <meta property="og:title" content="Νέα Ακραίφνιου">
  <meta property="og:description" content="Τελευταίες ειδήσεις για το Ακραίφνιο Βοιωτίας.">
  <meta property="og:locale" content="el_GR">

  <link rel="icon" type="image/png" sizes="64x64" href="../favicon-64.png">
  <link rel="icon" type="image/png" sizes="32x32" href="../favicon.png">
  <link rel="apple-touch-icon" sizes="180x180" href="../apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="192x192" href="../favicon-192.png">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --blue:    #1a6eb5;
      --blue-lt: #5aabdc;
      --navy:    #0d2a4a;
      --gold:    #d4a843;
      --gold-lt: #f0cc78;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Georgia', 'Times New Roman', serif;
      background: #07111f;
      color: #e8f4ff;
      min-height: 100vh;
      line-height: 1.7;
    }

    /* ── NAV ── */
    nav {
      position: sticky; top: 0; z-index: 100;
      background: rgba(7, 17, 40, 0.97);
      backdrop-filter: blur(8px);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 2rem;
      height: 56px;
      border-bottom: 1px solid rgba(90,171,220,0.18);
    }
    .nav-back {
      display: flex; align-items: center; gap: 0.5rem;
      color: #a8c8e8; text-decoration: none;
      font-family: sans-serif; font-size: 0.85rem; letter-spacing: 0.06em;
      transition: color .18s;
    }
    .nav-back:hover { color: var(--gold-lt); }
    .nav-back svg { width: 16px; height: 16px; flex-shrink: 0; }
    .nav-title { color: var(--gold-lt); font-size: 1.05rem; letter-spacing: 0.08em; }
    .nav-spacer { width: 120px; }

    /* ── CONTAINER ── */
    .container {
      max-width: 820px;
      margin: 0 auto;
      padding: 2.5rem 1.5rem 5rem;
    }

    /* ── HEADER ── */
    .page-header { margin-bottom: 2rem; }
    .section-label {
      display: inline-block;
      font-family: sans-serif; font-size: 0.72rem;
      letter-spacing: 0.18em; text-transform: uppercase;
      color: var(--blue-lt); margin-bottom: 0.5rem;
    }
    h1 { font-size: clamp(1.8rem, 4vw, 2.6rem); color: #e8f4ff; margin-bottom: 0.5rem; }
    .divider {
      width: 56px; height: 3px;
      background: linear-gradient(to right, var(--blue), var(--blue-lt));
      border-radius: 2px; margin-bottom: 0.5rem;
    }
    .header-row {
      display: flex; justify-content: space-between; align-items: flex-end;
      flex-wrap: wrap; gap: 1rem; margin-bottom: 1.8rem;
    }
    .refresh-btn {
      background: rgba(26,110,181,0.22);
      border: 1px solid rgba(90,171,220,0.3);
      color: var(--blue-lt); padding: 0.45rem 1.1rem;
      border-radius: 6px; cursor: pointer;
      font-family: sans-serif; font-size: 0.82rem;
      transition: background .2s, transform .1s;
    }
    .refresh-btn:hover { background: rgba(26,110,181,0.4); }
    .refresh-btn:active { transform: scale(0.97); }
    .refresh-btn:disabled { opacity: 0.45; cursor: wait; }
    .last-updated {
      font-family: sans-serif; font-size: 0.72rem; color: #3a5870; align-self: center;
    }

    /* ── NEWS FEED ── */
    #news-feed { display: flex; flex-direction: column; gap: 0; }

    .news-card {
      display: flex; flex-direction: column; gap: 0.3rem;
      padding: 1.3rem 0;
      border-bottom: 1px solid rgba(90,171,220,0.08);
      text-decoration: none;
      transition: background .15s;
      border-radius: 4px;
    }
    .news-card:first-child { padding-top: 0; }
    .news-card:hover { background: rgba(26,110,181,0.06); padding-left: 0.8rem; padding-right: 0.8rem; margin: 0 -0.8rem; }

    .news-meta {
      display: flex; align-items: center; gap: 0.6rem;
      font-family: sans-serif; font-size: 0.72rem; color: #3a6080;
    }
    .news-source {
      color: var(--blue-lt); font-weight: 600;
    }
    .news-dot { opacity: 0.4; }
    .news-date { color: #3a6080; }

    .news-title {
      font-size: 1.05rem; font-weight: 600; color: #d8eeff;
      line-height: 1.45;
      transition: color .15s;
    }
    .news-card:hover .news-title { color: #fff; }

    .news-desc {
      font-family: sans-serif; font-size: 0.82rem; color: #4a6880;
      line-height: 1.5;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
      overflow: hidden;
    }

    /* ── STATES ── */
    .news-loading, .news-error, .news-empty {
      text-align: center; padding: 4rem 2rem;
      font-family: sans-serif; font-style: italic; color: #3a5870;
    }
    .news-error { color: #e87070; }

    .news-spinner {
      display: inline-block; width: 28px; height: 28px;
      border: 2px solid rgba(90,171,220,0.15);
      border-top-color: var(--blue-lt);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 1rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── SOURCE BADGE ── */
    .news-source-dot {
      display: inline-block; width: 6px; height: 6px;
      border-radius: 50%; background: var(--blue-lt); opacity: 0.6;
      flex-shrink: 0;
    }

    /* ── FOOTER NOTE ── */
    .feed-note {
      margin-top: 2.5rem;
      padding: 0.8rem 1rem;
      background: rgba(26,110,181,0.06);
      border: 1px solid rgba(90,171,220,0.1);
      border-radius: 8px;
      font-family: sans-serif; font-size: 0.75rem; color: #3a6080; line-height: 1.6;
    }
    .feed-note a { color: var(--blue-lt); text-decoration: none; }
    .feed-note a:hover { text-decoration: underline; }

    @media (max-width: 600px) {
      .container { padding: 1.5rem 1rem 4rem; }
      .news-title { font-size: 0.98rem; }
    }
  </style>
</head>
<body>

<nav>
  <a href="/" class="nav-back">
    <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M10 3L5 8l5 5"/>
    </svg>
    Αρχική
  </a>
  <span class="nav-title">Ακραίφνιο</span>
  <div class="nav-spacer"></div>
</nav>

<div class="container">
  <div class="header-row">
    <div class="page-header">
      <span class="section-label">Google News · Αυτόματη Ενημέρωση</span>
      <h1>Νέα Ακραίφνιου</h1>
      <div class="divider"></div>
    </div>
    <div style="display:flex;flex-direction:column;align-items:flex-end;gap:0.4rem;">
      <span id="last-updated" class="last-updated"></span>
      <button id="refresh-btn" class="refresh-btn">↻ Ανανέωση</button>
    </div>
  </div>

  <div id="news-feed">
    <div class="news-loading">
      <div class="news-spinner"></div><br>
      Φόρτωση ειδήσεων…
    </div>
  </div>

  <div class="feed-note">
    Ειδήσεις από <a href="https://news.google.com/search?q=%CE%91%CE%BA%CF%81%CE%B1%CE%B9%CF%86%CE%BD%CE%B9%CE%BF&hl=el&gl=GR" target="_blank" rel="noopener">Google News</a> για αναζήτηση «Ακραιφνίο».
    Κάθε άρθρο ανοίγει στην πηγή του. Τα περιεχόμενα δεν ανήκουν στο akraifnio.gr.
  </div>
</div>

<script>
(function(){
  var RSS_URL='https://news.google.com/rss/search?q=%CE%91%CE%BA%CF%81%CE%B1%CE%B9%CF%86%CE%BD%CE%B9%CE%BF&hl=el&gl=GR&ceid=GR:el';
  var PROXY='https://api.allorigins.win/get?url=';

  var MONTHS_GR=['Ιαν','Φεβ','Μαρ','Απρ','Μαϊ','Ιουν','Ιουλ','Αυγ','Σεπ','Οκτ','Νοε','Δεκ'];

  function fmtDate(str){
    var d=new Date(str);
    if(isNaN(d))return str;
    var now=new Date();
    var diff=Math.floor((now-d)/60000);
    if(diff<2)return'μόλις τώρα';
    if(diff<60)return diff+' λεπτά πριν';
    if(diff<120)return'1 ώρα πριν';
    if(diff<1440)return Math.floor(diff/60)+' ώρες πριν';
    if(diff<2880)return'χθες';
    return d.getDate()+' '+MONTHS_GR[d.getMonth()]+' '+d.getFullYear();
  }

  function stripTags(html){
    var tmp=document.createElement('div');tmp.innerHTML=html;return tmp.textContent||'';
  }

  function cleanTitle(title,source){
    /* Google News appends " - Source Name" to titles; remove it */
    if(source&&title.endsWith(' - '+source))return title.slice(0,-(source.length+3));
    var m=title.match(/^(.*)\s-\s[^-]+$/);
    return m?m[1]:title;
  }

  function renderItems(items){
    var feed=document.getElementById('news-feed');
    if(!items||items.length===0){
      feed.innerHTML='<div class="news-empty">Δεν βρέθηκαν νέα αυτή τη στιγμή.</div>';
      return;
    }
    var html='';
    items.forEach(function(item){
      var title=item.querySelector('title')?item.querySelector('title').textContent:'';
      var link=item.querySelector('link')?item.querySelector('link').textContent:'#';
      var pubDate=item.querySelector('pubDate')?item.querySelector('pubDate').textContent:'';
      var sourceEl=item.querySelector('source');
      var source=sourceEl?sourceEl.textContent:'';
      var desc=item.querySelector('description')?stripTags(item.querySelector('description').innerHTML||item.querySelector('description').textContent):'';

      /* Google News link is inside textContent of <link>, but in RSS the <link> tag is
         tricky to parse via querySelector — grab via nextSibling method if empty */
      if(!link||link==='#'){
        var guidEl=item.querySelector('guid');
        if(guidEl)link=guidEl.textContent;
      }

      var cleanT=cleanTitle(title,source);
      var dateStr=fmtDate(pubDate);

      html+=
        '<a href="'+link+'" class="news-card" target="_blank" rel="noopener">'+
          '<div class="news-meta">'+
            (source?'<span class="news-source-dot"></span><span class="news-source">'+source+'</span><span class="news-dot">·</span>':'')+
            '<span class="news-date">'+dateStr+'</span>'+
          '</div>'+
          '<div class="news-title">'+cleanT+'</div>'+
          (desc?'<div class="news-desc">'+desc.trim()+'</div>':'')+
        '</a>';
    });
    feed.innerHTML=html;

    var now=new Date();
    var p=function(n){return n<10?'0'+n:''+n;};
    document.getElementById('last-updated').textContent=
      'Ενημερώθηκε '+p(now.getHours())+':'+p(now.getMinutes());
  }

  function doFetch(){
    var feed=document.getElementById('news-feed');
    var btn=document.getElementById('refresh-btn');
    feed.innerHTML='<div class="news-loading"><div class="news-spinner"></div><br>Φόρτωση ειδήσεων…</div>';
    if(btn){btn.disabled=true;btn.textContent='⏳ Φόρτωση…';}

    fetch(PROXY+encodeURIComponent(RSS_URL))
      .then(function(r){return r.json();})
      .then(function(j){
        var xml=j.contents;
        var parser=new DOMParser();
        var doc=parser.parseFromString(xml,'text/xml');
        var parserError=doc.querySelector('parsererror');
        if(parserError)throw new Error('XML parse error');
        var items=Array.from(doc.querySelectorAll('item'));
        renderItems(items);
        if(btn){btn.disabled=false;btn.textContent='↻ Ανανέωση';}
      })
      .catch(function(){
        feed.innerHTML=
          '<div class="news-error">'+
            '⚠ Αδυναμία φόρτωσης ειδήσεων.<br>'+
            '<a href="https://news.google.com/search?q=%CE%91%CE%BA%CF%81%CE%B1%CE%B9%CF%86%CE%BD%CE%B9%CE%BF&hl=el&gl=GR" '+
            'target="_blank" rel="noopener" style="color:#5aabdc;font-style:normal;">'+
            'Δείτε τα νέα απευθείας στο Google News →</a>'+
          '</div>';
        if(btn){btn.disabled=false;btn.textContent='↻ Ανανέωση';}
      });
  }

  document.addEventListener('DOMContentLoaded',function(){
    document.getElementById('refresh-btn').addEventListener('click',doFetch);
    doFetch();
  });
})();
</script>
</body>
</html>
